<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>post app</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">PostApp</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav  mb-2 mb-lg-0 fw-bold text-center ms-auto pl-2 ">
          <li class="nav-item" id="logoutBtn">
            <button class="btn btn-danger ms-2 logoutBtn" onclick="logout()">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
   <div class="container ptCont mt-5" id="postContainer">
    <div class="row">
      <div class="col-sm-12 col-md-6 col-lg-4">
        <div class="card postcont p-3 m-2">
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" aria-describedby="emailHelp"
              placeholder="add title name " />
          </div>
          <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="3" placeholder="add a post description"></textarea>
          </div>
          <div class="mb-3 d-flex images justify-content-around">
            <img class="bgImg" onclick="addImg('images/1.webp')" src="images/1.webp" alt="">
            <img class="bgImg" onclick="addImg('images/4.jpg')" src="images/4.jpg" alt="">
            <img class="bgImg" onclick="addImg('images/5.jpg')" src="images/5.jpg" alt="">
            <img class="bgImg" onclick="addImg('images/3.webp')" src="images/3.webp" alt="">
            <img class="bgImg" onclick="addImg('images/2.webp')" src="images/2.webp" alt="">
          </div>
          <label class="form-label ">Text Color</label>
                    <div class="color-div d-flex flex-wrap justify-content-around">
                        <div class="colorbox"
                            style="background-color: #b96c9a; width: 45px; height: 45px; border-radius: 12%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #e49287; width: 45px; height: 45px; border-radius: 12%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #4f9ea8; width: 45px; height: 45px; border-radius: 12%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #8f8a5c; width: 45px; height: 45px; border-radius: 12%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #026857; width: 45px; height: 45px; border-radius: 12%;"
                            onclick="applycolor(this)"></div>
                    </div>
          <button onclick="post()" type="submit" class="btn btn-primary ms-auto postbtn w-100 mt-3">
            Post
          </button>
        </div>
      </div>
      <div class="col-sm-12 col-md-6 col-lg-8">
        <div id="posts" class="posts m-2"></div>
      </div>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
