<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 login" style="width: 100%; max-width: 400px;"> 
        <h3 class="text-center mb-4">login</h3>
        <form>
            <input type="email" id="loginEmail" class="mb-3" placeholder="Email" required>

            <input type="password" id="loginPassword" class="mb-3" placeholder="Password" required>

            <button type="button" onclick="login()" class="btn loginbtn w-100 mb-2">
                Login
            </button>
        </form>
        <p class="text-center mt-2">
            Don't have an account?
            <a href="index.html">Sign Up</a>
        </p>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
